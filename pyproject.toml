[project]
name = "notes-cli"
version = "0.1.0"
description = "A simple notes app"
requires-python = ">=3.12"
dependencies = [
    "mcp[cli]>=1.27.2",
]

[project.scripts]
notes = "notes:main"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["."]
only-include = ["notes.py"]
