name: Tests

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  fast-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true
      - name: Run fast test suite
        run: uv run --locked pytest -q
